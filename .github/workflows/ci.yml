name: CI

on:
  pull_request:
    branches: [main, modernize-updates]
  push:
    branches: [main, modernize-updates]

jobs:
  verify:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Bun drives install + scripts. Version pinned to match packageManager in package.json.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # Node 24 LTS runtime for the tools bun invokes (next build, chakra typegen — needs Node >= 20.6.0).
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate theme typings
        run: bun run theme

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build
